<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Vertical Video Thumbnail</title>
    <style>
      body {
        font-family: system-ui;
        padding: 40px;
      }

      video,
      img {
        max-width: 320px;
        display: block;
        margin-top: 20px;
        border-radius: 8px;
      }

      button {
        margin-top: 20px;
        padding: 10px 16px;
        font-size: 16px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h1>竖屏视频缩略图生成</h1>

    <video
      id="video"
      crossorigin="anonymous"
      preload="metadata"
      src="./1234.mp4"
    ></video>

    <button id="capture">截取竖屏缩略图</button>

    <canvas id="canvas" style="display: none"></canvas>

    <h3>结果：</h3>
    <img id="thumb" />

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const thumb = document.getElementById("thumb");
      const btn = document.getElementById("capture");

      const TARGET_RATIO = 16 / 9; // 竖屏比例

      video.addEventListener("loadedmetadata", () => {
        video.currentTime = 1; // 截第 1 秒
      });

      btn.addEventListener("click", () => {
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        // 目标裁切区域
        let cropWidth, cropHeight;

        if (vw / vh > TARGET_RATIO) {
          // 视频太宽 → 裁左右
          cropHeight = vh;
          cropWidth = vh * TARGET_RATIO;
        } else {
          // 视频太高 → 裁上下（一般竖屏视频才会进这里）
          cropWidth = vw;
          cropHeight = vw / TARGET_RATIO;
        }

        const sx = (vw - cropWidth) / 2;
        const sy = (vh - cropHeight) / 2;

        canvas.width = cropWidth;
        canvas.height = cropHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(
          video,
          sx,
          sy,
          cropWidth,
          cropHeight, // 从视频裁
          0,
          0,
          cropWidth,
          cropHeight, // 画到 canvas
        );

        thumb.src = canvas.toDataURL("image/jpeg", 0.9);
      });
    </script>
  </body>
</html>
